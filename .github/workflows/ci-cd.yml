name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/mon-projet-devops/frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/mon-projet-devops/backend

jobs:
  # ──────────────────────────────────────────────
  # Job 1 : Build & Test
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Backend ──
      - name: Run Django tests
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: test
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.BACKEND_IMAGE }}:test
          cache-from: type=gha,scope=backend

      # ── Frontend ──
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}:test
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run React tests
        run: npm test
        working-directory: frontend

  # ──────────────────────────────────────────────
  # Job 2 : SonarQube Quality Gate
  # ──────────────────────────────────────────────
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.organization=haykel
            -Dsonar.projectKey=haykel_mon-projet-devops
            -Dsonar.sources=.
            -Dsonar.exclusions=**/*.test.ts,**/*.spec.ts

  # ──────────────────────────────────────────────
  # Job 3 : Security Scan
  # ──────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.BACKEND_IMAGE }}:scan
          cache-from: type=gha,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.FRONTEND_IMAGE }}:scan
          cache-from: type=gha,scope=frontend

      - name: Trivy scan — backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.BACKEND_IMAGE }}:scan
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Trivy scan — frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.FRONTEND_IMAGE }}:scan
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

  # ──────────────────────────────────────────────
  # Job 4 : Push to GHCR
  # ──────────────────────────────────────────────
  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [build-and-test, sonarqube, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
