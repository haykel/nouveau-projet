replicaCount: 2

image:
  repository: ghcr.io/haykel/mon-projet-devops/backend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  host: app.local
  path: /api
  pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

healthcheck:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10
