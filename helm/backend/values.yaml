replicaCount: 2

image:
  repository: ghcr.io/haykel/autism-screening-platform/backend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  host: screening.local
  path: /
  pathType: Prefix

env:
  DJANGO_DEBUG: "false"
  DB_HOST: postgresql
  DB_NAME: autism_screening
  DB_USER: django
  DB_PORT: "5432"
  PROVIDER_SEARCH_RADIUS_KM: "30"

secretRef: backend-secret

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

healthcheck:
  path: /health/
  initialDelaySeconds: 10
  periodSeconds: 10
